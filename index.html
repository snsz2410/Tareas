<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotación de Basura</title>
    <style>
        /* Paleta de colores - Modo Oscuro Fijo */
        :root {
            --primary-color: #0ea5e9; 
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --btn-bg: #1f2937;
            --btn-text: #0ea5e9;
            
            /* Colores por persona */
            --color-seb: #3b82f6; 
            --color-ste: #10b981; 
            --color-san: #f59e0b; 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 30px;
            text-align: center;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background-color: var(--btn-bg);
            border: 2px solid var(--primary-color);
            color: var(--btn-text);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
            flex: 1;
            min-width: 100px;
            max-width: 200px;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--primary-color);
            color: #ffffff;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Vista de Día Actual */
        .today-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border-top: 5px solid var(--primary-color);
            margin-top: 20px;
        }

        .today-subtitle {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .today-name {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Tarjetas de la Semana */
        .week-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .day-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--border-color);
        }

        .day-card.active-today {
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
            transform: scale(1.02);
            border-right: 1px solid var(--primary-color);
            border-top: 1px solid var(--primary-color);
            border-bottom: 1px solid var(--primary-color);
        }

        .day-name { font-size: 1.2rem; font-weight: bold; }
        .day-date { color: var(--text-muted); font-size: 0.9rem; }
        
        .person-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Vista Mensual (Calendario) */
        .calendar-header {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary-color);
            text-transform: capitalize;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .cal-day-name {
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
            color: var(--text-muted);
            background: var(--card-bg);
            border-radius: 6px;
        }

        .cal-cell {
            background: var(--card-bg);
            border-radius: 6px;
            min-height: 80px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
        }

        .cal-cell.today {
            border-color: var(--primary-color);
            box-shadow: inset 0 0 10px rgba(14, 165, 233, 0.2);
        }

        .cal-date {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: auto;
        }

        .cal-person {
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 4px 0;
            border-radius: 4px;
            margin-top: 5px;
        }

        /* Clases para mostrar/ocultar nombres según pantalla */
        .short-name { display: none; }
        .full-name { display: inline; }

        /* Colores dinámicos */
        .bg-seb { background-color: rgba(59, 130, 246, 0.2); color: var(--color-seb); border: 1px solid rgba(59, 130, 246, 0.3); }
        .bg-ste { background-color: rgba(16, 185, 129, 0.2); color: var(--color-ste); border: 1px solid rgba(16, 185, 129, 0.3); }
        .bg-san { background-color: rgba(245, 158, 11, 0.2); color: var(--color-san); border: 1px solid rgba(245, 158, 11, 0.3); }
        
        .border-seb { border-left-color: var(--color-seb) !important; }
        .border-ste { border-left-color: var(--color-ste) !important; }
        .border-san { border-left-color: var(--color-san) !important; }

        /* OPTIMIZACIÓN PARA CELULARES */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .tabs { gap: 5px; }
            .tab-btn { padding: 10px 5px; font-size: 14px; }
            
            .calendar-grid { gap: 3px; }
            .cal-day-name { font-size: 0.8rem; padding: 6px 0; }
            .cal-cell { min-height: 65px; padding: 3px; }
            .cal-date { font-size: 0.8rem; }
            
            .cal-person { 
                font-size: 0.85rem; 
                padding: 3px 0; 
                letter-spacing: 0.5px;
            }
            
            /* Acá ocurre la magia: Oculta el nombre completo y muestra la abreviación */
            .full-name { display: none; }
            .short-name { display: inline; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1> Rotación de Basura</h1>

    <div class="tabs">
        <button id="btn-day" class="tab-btn active" onclick="switchView('day')">Día Actual</button>
        <button id="btn-week" class="tab-btn" onclick="switchView('week')">Semana</button>
        <button id="btn-month" class="tab-btn" onclick="switchView('month')">Mensual</button>
    </div>

    <div id="view-day" class="view-section active">
        <div class="today-card" id="today-content"></div>
    </div>

    <div id="view-week" class="view-section">
        <div class="week-grid" id="week-content"></div>
    </div>

    <div id="view-month" class="view-section">
        <div class="calendar-header" id="month-name"></div>
        <div class="calendar-grid">
            <div class="cal-day-name">Lun</div>
            <div class="cal-day-name">Mar</div>
            <div class="cal-day-name">Mié</div>
            <div class="cal-day-name">Jue</div>
            <div class="cal-day-name">Vie</div>
            <div class="cal-day-name">Sáb</div>
            <div class="cal-day-name">Dom</div>
        </div>
        <div class="calendar-grid" id="calendar-content" style="margin-top: 5px;"></div>
    </div>
</div>

<script>
    const people = ['Sebastián', 'Stéfano', 'Santiago'];
    const epochDate = Date.UTC(2024, 0, 1); 
    
    const dayNames = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

    function getPersonForDate(dateObj) {
        const targetDate = Date.UTC(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
        const diffDays = Math.floor((targetDate - epochDate) / (1000 * 60 * 60 * 24));
        const index = diffDays % 3;
        return {
            name: people[index],
            short: people[index].substring(0, 3), // Genera 'Seb', 'Sté', 'San'
            id: people[index].substring(0, 3).toLowerCase() 
        };
    }

    function normalizeId(id) {
        if(id.includes('seb')) return 'seb';
        if(id.includes('st')) return 'ste';
        if(id.includes('san')) return 'san';
        return '';
    }

    function renderDayView() {
        const today = new Date();
        const person = getPersonForDate(today);
        const cssId = normalizeId(person.id);
        const colorVar = `var(--color-${cssId})`;

        document.getElementById('today-content').innerHTML = `
            <div class="today-subtitle">Hoy (${dayNames[today.getDay()]} ${today.getDate()}) le toca a:</div>
            <div class="today-name" style="color: ${colorVar}">${person.name}</div>
        `;
    }

    function renderWeekView() {
        const today = new Date();
        const currentDay = today.getDay();
        const diffToMonday = today.getDate() - currentDay + (currentDay === 0 ? -6 : 1);
        const monday = new Date(today.setDate(diffToMonday));

        let html = '';
        const todayStr = new Date().toDateString(); 

        for (let i = 0; i < 7; i++) {
            const loopDate = new Date(monday);
            loopDate.setDate(monday.getDate() + i);
            
            const person = getPersonForDate(loopDate);
            const cssId = normalizeId(person.id);
            const isToday = loopDate.toDateString() === todayStr;

            html += `
                <div class="day-card border-${cssId} ${isToday ? 'active-today' : ''}">
                    <div>
                        <div class="day-name">${dayNames[loopDate.getDay()]}</div>
                        <div class="day-date">${loopDate.getDate()} de ${monthNames[loopDate.getMonth()]}</div>
                    </div>
                    <div class="person-badge bg-${cssId}">
                        ${person.name}
                    </div>
                </div>
            `;
        }
        document.getElementById('week-content').innerHTML = html;
    }

    function renderMonthView() {
        const today = new Date();
        const year = today.getFullYear();
        const month = today.getMonth();
        
        document.getElementById('month-name').textContent = `${monthNames[month]} ${year}`;

        const firstDayOfMonth = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let startCol = firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1;

        let html = '';
        const todayStr = new Date().toDateString();

        for (let i = 0; i < startCol; i++) {
            html += `<div class="cal-cell" style="background: transparent; border: none;"></div>`;
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const loopDate = new Date(year, month, day);
            const person = getPersonForDate(loopDate);
            const cssId = normalizeId(person.id);
            const isToday = loopDate.toDateString() === todayStr;

            html += `
                <div class="cal-cell ${isToday ? 'today' : ''}">
                    <div class="cal-date">${day}</div>
                    <div class="cal-person bg-${cssId}">
                        <span class="full-name">${person.name}</span>
                        <span class="short-name">${person.short}</span>
                    </div>
                </div>
            `;
        }

        document.getElementById('calendar-content').innerHTML = html;
    }

    function switchView(view) {
        document.getElementById('btn-day').classList.toggle('active', view === 'day');
        document.getElementById('btn-week').classList.toggle('active', view === 'week');
        document.getElementById('btn-month').classList.toggle('active', view === 'month');
        
        document.getElementById('view-day').classList.toggle('active', view === 'day');
        document.getElementById('view-week').classList.toggle('active', view === 'week');
        document.getElementById('view-month').classList.toggle('active', view === 'month');
    }

    function init() {
        renderDayView();
        renderWeekView();
        renderMonthView();
    }

    init();
    setInterval(init, 3600000); 

</script>

</body>
</html>
